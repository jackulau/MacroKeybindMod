site_name: MacroKeybindMod
site_description: >-
  A modern, multi-version rewrite of the Macro / Keybind Mod — a client-side
  Minecraft macro engine with its own scripting DSL, running on Fabric across
  the entire 1.21.x line and back to 1.19.

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    logo: material/keyboard-outline

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: macro
          class: language-macro
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  generator: false

extra_css:
  - stylesheets/vendor/codemirror.min.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/vendor/codemirror.min.js
  - javascripts/vendor/simple.min.js
  - javascripts/vendor/runmode.min.js
  - javascripts/vendor/colorize.min.js
  - javascripts/macromod-editor.js

nav:
  - Home: index.md
  - Editor: editor.md
  - Guide:
      - Getting Started: guide/getting-started.md
      - The DSL Language: guide/dsl-language.md
      - Parameters & Variables: guide/parameters.md
      - Pathfinding: guide/pathfinding.md
      - Architecture: guide/architecture.md
  - Catalog:
      - Parity Overview: catalog/PARITY.md
      - Actions: catalog/ACTIONS.md
      - Variables: catalog/VARIABLES.md
      - Events: catalog/EVENTS.md
  - Versions: VERSIONS.md
  - Reference:
      - DSL Reference: DSL-REFERENCE.md
      - Architecture Reference: ARCHITECTURE-REFERENCE.md
